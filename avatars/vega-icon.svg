<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Vega navigation star">
  <defs>
    <radialGradient id="bg" cx="28%" cy="22%" r="78%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="starFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#99f6e4"/>
      <stop offset="35%" stop-color="#2dd4bf"/>
      <stop offset="70%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#134e4a" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#2dd4bf" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#134e4a" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- subtle horizon arc -->
  <path fill="none" stroke="#0e7490" stroke-width="1.5" stroke-opacity="0.25" d="M 56 320 Q 256 280 456 320"/>
  <!-- outer bearing ring -->
  <circle cx="256" cy="256" r="198" fill="none" stroke="url(#ring)" stroke-width="2.5" opacity="0.9"/>
  <!-- cardinal ticks -->
  <g stroke="#5eead4" stroke-width="3" stroke-linecap="round" opacity="0.55">
    <line x1="256" y1="58" x2="256" y2="88"/>
    <line x1="256" y1="424" x2="256" y2="454"/>
    <line x1="58" y1="256" x2="88" y2="256"/>
    <line x1="424" y1="256" x2="454" y2="256"/>
  </g>
  <!-- Vega: primary four-point star (celestial fix) -->
  <g filter="url(#glow)">
    <path fill="url(#starFace)" d="
      M 256 108
      L 278 228
      L 404 256
      L 278 284
      L 256 404
      L 234 284
      L 108 256
      L 234 228
      Z"/>
  </g>
  <!-- inner brilliance -->
  <circle cx="256" cy="256" r="28" fill="#ccfbf1" opacity="0.35"/>
  <circle cx="256" cy="256" r="12" fill="#f0fdfa" opacity="0.55"/>
</svg>
